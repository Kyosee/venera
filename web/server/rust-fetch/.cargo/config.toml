# Cargo mirror used inside the Docker build stage. Override at build time
# with --build-arg DISABLE_CARGO_MIRROR=1 to use upstream crates.io directly.
[source.crates-io]
replace-with = "rsproxy-sparse"

[source.rsproxy-sparse]
registry = "sparse+https://rsproxy.cn/index/"

[net]
git-fetch-with-cli = true
